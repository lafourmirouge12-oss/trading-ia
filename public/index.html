<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IA de Trading</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --holo-cyan: #00f5ff;
      --holo-blue: #0080ff;
      --holo-purple: #8000ff;
      --holo-green: #00ff88;
      --holo-red: #ff3060;
      --dark: #020510;
      --panel: rgba(0, 20, 50, 0.6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPulse 8s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 50%, rgba(0,128,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 30%, rgba(128,0,255,0.08) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    @keyframes gridPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute; width: 2px; height: 2px;
      border-radius: 50%; animation: float linear infinite; opacity: 0;
    }
    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      10% { opacity: 1; } 90% { opacity: 1; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }
    .container {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px;
    }
    .nav-abonnement {
      position: absolute; top: 40px; right: 40px;
      font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(0,245,255,0.6); text-decoration: none;
      text-transform: uppercase;
      border: 1px solid rgba(0,245,255,0.2);
      padding: 10px 18px; transition: all 0.3s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .nav-abonnement:hover { color: var(--holo-cyan); border-color: var(--holo-cyan); box-shadow: 0 0 20px rgba(0,245,255,0.2); }
    .header { text-align: center; margin-bottom: 40px; animation: fadeDown 1s ease forwards; }
    .header-badge { display: inline-block; font-size: 11px; letter-spacing: 4px; color: var(--holo-cyan); text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 5vw, 52px); font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--holo-cyan) 40%, var(--holo-blue) 70%, var(--holo-purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,245,255,0.4));
    }
    .header-line { width: 200px; height: 1px; margin: 16px auto 0; background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent); animation: lineGlow 2s ease-in-out infinite; }
    @keyframes lineGlow { 0%, 100% { opacity: 0.4; width: 150px; } 50% { opacity: 1; width: 250px; } }
    .upload-panel { width: 100%; max-width: 700px; position: relative; margin-bottom: 30px; animation: fadeUp 1s ease 0.3s forwards; opacity: 0; }
    .corner { position: absolute; width: 20px; height: 20px; z-index: 2; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--holo-cyan); }
    .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
    .corner::after { width: 2px; height: 100%; top: 0; left: 0; }
    .corner.tr::before { left: auto; right: 0; } .corner.tr::after { left: auto; right: 0; }
    .corner.bl::before { top: auto; bottom: 0; } .corner.bl::after { top: auto; bottom: 0; }
    .corner.br::before { left: auto; right: 0; top: auto; bottom: 0; } .corner.br::after { left: auto; right: 0; top: auto; bottom: 0; }
    .corner.tl { top: -2px; left: -2px; } .corner.tr { top: -2px; right: -2px; }
    .corner.bl { bottom: -2px; left: -2px; } .corner.br { bottom: -2px; right: -2px; }
    .upload-box {
      background: var(--panel); border: 1px solid rgba(0,245,255,0.2);
      border-radius: 4px; padding: 16px; cursor: pointer; transition: all 0.3s ease;
      position: relative; overflow: hidden; min-height: 280px;
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
    }
    .upload-box::after {
      content: ''; position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.6), transparent);
      animation: scanLine 4s ease-in-out infinite; pointer-events: none;
    }
    @keyframes scanLine { 0% { top: -2px; opacity: 0; } 5% { opacity: 1; } 95% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
    .upload-box:hover { border-color: rgba(0,245,255,0.5); box-shadow: 0 0 30px rgba(0,245,255,0.1); }
    .upload-box.drag { border-color: var(--holo-cyan); box-shadow: 0 0 60px rgba(0,245,255,0.3); }
    .upload-content { text-align: center; position: relative; z-index: 1; }
    .upload-icon { width: 64px; height: 64px; margin: 0 auto 20px; position: relative; }
    .upload-icon svg { width: 100%; height: 100%; stroke: var(--holo-cyan); fill: none; filter: drop-shadow(0 0 8px var(--holo-cyan)); }
    .upload-ring { position: absolute; inset: -8px; border: 1px solid rgba(0,245,255,0.3); border-radius: 50%; animation: ringPulse 2s ease-in-out infinite; }
    .upload-ring:nth-child(2) { inset: -16px; animation-delay: 0.5s; border-color: rgba(0,245,255,0.15); }
    @keyframes ringPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }
    .upload-title { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 3px; color: var(--holo-cyan); text-transform: uppercase; margin-bottom: 8px; }
    .upload-sub { font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }
    #preview { max-width: 100%; max-height: 350px; border-radius: 2px; display: none; filter: drop-shadow(0 0 20px rgba(0,245,255,0.3)); }
    .hud-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; margin-top: 1px; background: rgba(0,245,255,0.04); border: 1px solid rgba(0,245,255,0.1); border-radius: 2px; }
    .hud-item { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 2px; color: rgba(0,245,255,0.5); text-transform: uppercase; }
    .hud-item span { color: var(--holo-green); margin-left: 6px; }
    .hud-dot { width: 6px; height: 6px; background: var(--holo-green); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px var(--holo-green); animation: blink 2s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .btn-wrapper { position: relative; margin-bottom: 30px; animation: fadeUp 1s ease 0.6s forwards; opacity: 0; }
    #analyzeBtn {
      font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
      letter-spacing: 5px; text-transform: uppercase; color: #fff; background: transparent;
      border: 1px solid rgba(0,245,255,0.4); padding: 18px 60px; cursor: pointer;
      position: relative; overflow: hidden; transition: all 0.3s ease;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    }
    #analyzeBtn::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transform: skewX(-20deg); transition: left 0.5s ease; }
    #analyzeBtn:hover::after { left: 150%; }
    #analyzeBtn:hover { border-color: var(--holo-cyan); box-shadow: 0 0 30px rgba(0,245,255,0.3); color: var(--holo-cyan); }
    #analyzeBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-corner { position: absolute; width: 8px; height: 8px; border-color: var(--holo-cyan); border-style: solid; }
    .btn-corner.tl { top: -1px; left: 0; border-width: 2px 0 0 2px; }
    .btn-corner.tr { top: -1px; right: 0; border-width: 2px 2px 0 0; }
    .btn-corner.bl { bottom: -1px; left: 0; border-width: 0 0 2px 2px; }
    .btn-corner.br { bottom: -1px; right: 0; border-width: 0 2px 2px 0; }
    .loading-bar { display: none; width: 300px; height: 2px; background: rgba(0,245,255,0.1); margin-top: 16px; position: relative; overflow: hidden; }
    .loading-bar.active { display: block; }
    .loading-bar::after { content: ''; position: absolute; left: -40%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent); animation: loadSweep 1.2s ease-in-out infinite; }
    @keyframes loadSweep { 0% { left: -40%; } 100% { left: 140%; } }
    .loading-text { display: none; font-family: 'Orbitron', monospace; font-size: 10px; letter-spacing: 3px; color: var(--holo-cyan); text-transform: uppercase; margin-top: 8px; animation: textBlink 1s ease-in-out infinite; }
    .loading-text.active { display: block; }
    @keyframes textBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ===== RESULT PANEL ===== */
    .result-panel { width: 100%; max-width: 700px; display: none; }
    .result-panel.visible { display: block; animation: fadeUp 0.6s ease forwards; }

    /* Decision block BUY/SELL */
    .decision-block {
      width: 100%; padding: 20px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 900;
      letter-spacing: 8px; text-transform: uppercase;
      border-radius: 4px; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .decision-block.buy {
      background: rgba(0, 255, 136, 0.08);
      border: 2px solid var(--holo-green);
      color: var(--holo-green);
      box-shadow: 0 0 40px rgba(0,255,136,0.15), inset 0 0 40px rgba(0,255,136,0.05);
    }
    .decision-block.sell {
      background: rgba(255, 48, 96, 0.08);
      border: 2px solid var(--holo-red);
      color: var(--holo-red);
      box-shadow: 0 0 40px rgba(255,48,96,0.15), inset 0 0 40px rgba(255,48,96,0.05);
    }
    .decision-block.neutral {
      background: rgba(0,245,255,0.05);
      border: 2px solid rgba(0,245,255,0.3);
      color: var(--holo-cyan);
    }
    .confidence {
      position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
      font-size: 13px; letter-spacing: 2px; opacity: 0.7;
    }

    /* Metrics grid */
    .metrics-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    .metric-block {
      background: rgba(0, 10, 30, 0.8);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 4px; padding: 16px 12px;
      text-align: center; position: relative;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .metric-block:hover { border-color: rgba(0,245,255,0.4); box-shadow: 0 0 20px rgba(0,245,255,0.08); }
    .metric-label {
      font-family: 'Orbitron', monospace; font-size: 8px;
      letter-spacing: 3px; color: rgba(0,245,255,0.5);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .metric-value {
      font-family: 'Orbitron', monospace; font-size: 20px;
      font-weight: 700; color: #fff; letter-spacing: 1px;
    }
    .metric-block.entry .metric-value { color: var(--holo-cyan); }
    .metric-block.sl .metric-value { color: var(--holo-red); }
    .metric-block.tp .metric-value { color: var(--holo-green); }
    .metric-sub { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 6px; letter-spacing: 1px; }

    /* Analyse cachée */
    .analysis-toggle {
      width: 100%;
      background: rgba(0,245,255,0.03);
      border: 1px solid rgba(0,245,255,0.1);
      border-radius: 4px; overflow: hidden;
    }
    .analysis-toggle-btn {
      width: 100%; background: none; border: none;
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.3s;
    }
    .analysis-toggle-btn:hover { background: rgba(0,245,255,0.05); }
    .analysis-toggle-label {
      font-family: 'Orbitron', monospace; font-size: 9px;
      letter-spacing: 3px; color: rgba(0,245,255,0.4);
      text-transform: uppercase;
    }
    .analysis-arrow { font-size: 10px; color: rgba(0,245,255,0.4); transition: transform 0.3s; }
    .analysis-toggle.open .analysis-arrow { transform: rotate(180deg); }
    .analysis-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s ease;
      padding: 0 16px;
    }
    .analysis-toggle.open .analysis-body { max-height: 600px; padding: 0 16px 16px; }
    .analysis-text {
      font-size: 11px; line-height: 1.7;
      color: rgba(255,255,255,0.35); letter-spacing: 0.3px;
      font-family: 'Rajdhani', sans-serif;
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<a href="abonnement.html" class="nav-abonnement">◈ Abonnements</a>
<div class="particles" id="particles"></div>

<div class="container">
  <div class="header">
    <div class="header-badge">◈ Système d'analyse avancée ◈</div>
    <h1>IA de Trading</h1>
    <div class="header-line"></div>
  </div>

  <div class="upload-panel">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="upload-box" id="uploadBox">
      <input type="file" id="fileInput" accept="image/*" hidden />
      <div class="upload-content" id="uploadContent">
        <div class="upload-icon">
          <div class="upload-ring"></div><div class="upload-ring"></div>
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="12" width="56" height="40" rx="2" stroke-width="1.5"/>
            <polyline points="4,36 18,24 30,32 44,18 60,28" stroke-width="1.5"/>
            <circle cx="44" cy="18" r="3" fill="rgba(0,245,255,0.3)" stroke-width="1.5"/>
            <line x1="32" y1="44" x2="32" y2="52" stroke-width="1.5"/>
            <line x1="24" y1="52" x2="40" y2="52" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="upload-title">Importer graphique</div>
        <div class="upload-sub">Glisser-déposer ou cliquer pour sélectionner</div>
      </div>
      <img id="preview" src="" alt="graphique" />
    </div>
    <div class="hud-bar">
      <div class="hud-item"><span class="hud-dot"></span>SYSTÈME <span>EN LIGNE</span></div>
      <div class="hud-item">MODÈLE <span>CLAUDE AI</span></div>
      <div class="hud-item">STATUT <span id="statusText">EN ATTENTE</span></div>
    </div>
  </div>

  <div class="btn-wrapper">
    <div class="btn-corner tl"></div><div class="btn-corner tr"></div>
    <div class="btn-corner bl"></div><div class="btn-corner br"></div>
    <button id="analyzeBtn" onclick="analyzeChart()">Analyser</button>
    <div style="text-align:center;">
      <div class="loading-bar" id="loadingBar"></div>
      <div class="loading-text" id="loadingText">Analyse en cours...</div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-panel" id="resultPanel">

    <!-- BUY / SELL -->
    <div class="decision-block" id="decisionBlock">
      <span id="decisionText">—</span>
      <span class="confidence" id="confidenceText"></span>
    </div>

    <!-- Métriques -->
    <div class="metrics-grid">
      <div class="metric-block entry">
        <div class="metric-label">Entrée</div>
        <div class="metric-value" id="metricEntry">—</div>
        <div class="metric-sub">Zone d'entrée</div>
      </div>
      <div class="metric-block sl">
        <div class="metric-label">Stop Loss</div>
        <div class="metric-value" id="metricSL">—</div>
        <div class="metric-sub">Risque max</div>
      </div>
      <div class="metric-block tp">
        <div class="metric-label">Take Profit</div>
        <div class="metric-value" id="metricTP">—</div>
        <div class="metric-sub">Objectif</div>
      </div>
    </div>

    <!-- Analyse cachée -->
    <div class="analysis-toggle" id="analysisToggle">
      <button class="analysis-toggle-btn" onclick="toggleAnalysis()">
        <span class="analysis-toggle-label">◈ Analyse technique détaillée</span>
        <span class="analysis-arrow">▾</span>
      </button>
      <div class="analysis-body">
        <div class="analysis-text" id="analysisText"></div>
      </div>
    </div>

  </div>
</div>

<script>
  // Particles
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      animation-duration: ${6 + Math.random() * 12}s;
      animation-delay: ${Math.random() * 10}s;
      --drift: ${(Math.random() - 0.5) * 100}px;
      background: ${Math.random() > 0.5 ? '#00f5ff' : Math.random() > 0.5 ? '#0080ff' : '#8000ff'};
      box-shadow: 0 0 4px currentColor;
    `;
    pContainer.appendChild(p);
  }

  const uploadBox = document.getElementById('uploadBox');
  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const uploadContent = document.getElementById('uploadContent');

  uploadBox.addEventListener('click', () => fileInput.click());
  uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag'); });
  uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag'));
  uploadBox.addEventListener('drop', e => {
    e.preventDefault(); uploadBox.classList.remove('drag');
    if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) showPreview(fileInput.files[0]); });

  function showPreview(file) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadContent.style.display = 'none';
    };
    reader.readAsDataURL(file);
    document.getElementById('statusText').textContent = 'IMAGE CHARGÉE';
  }

  function toggleAnalysis() {
    document.getElementById('analysisToggle').classList.toggle('open');
  }

  function parseResult(text) {
    const decision = { type: 'neutral', text: 'NEUTRE', confidence: '' };
    const metrics = { entry: '—', sl: '—', tp: '—' };
    let analysis = text;

    // Détecter BUY ou SELL
    if (/\bBUY\b/i.test(text)) {
      decision.type = 'buy'; decision.text = '▲ BUY';
    } else if (/\bSELL\b/i.test(text)) {
      decision.type = 'sell'; decision.text = '▼ SELL';
    }

    // Détecter confiance
    const confMatch = text.match(/(\d{1,3})\s*%/);
    if (confMatch) decision.confidence = confMatch[1] + '%';

    // Détecter entrée
    const entryMatch = text.match(/entr[ée][^:]*:\s*([0-9\s,.]+)/i);
    if (entryMatch) metrics.entry = entryMatch[1].trim().split('\n')[0].substring(0, 12);

    // Détecter SL
    const slMatch = text.match(/stop\s*loss[^:]*:\s*([0-9\s,.]+)/i);
    if (slMatch) metrics.sl = slMatch[1].trim().split('\n')[0].substring(0, 12);

    // Détecter TP
    const tpMatch = text.match(/take\s*profit[^:]*:\s*([0-9\s,.]+)/i);
    if (tpMatch) metrics.tp = tpMatch[1].trim().split('\n')[0].substring(0, 12);

    return { decision, metrics, analysis };
  }

  async function analyzeChart() {
    const file = fileInput.files[0];
    if (!file) { alert('Veuillez sélectionner une image !'); return; }

    const btn = document.getElementById('analyzeBtn');
    const resultPanel = document.getElementById('resultPanel');
    const loadingBar = document.getElementById('loadingBar');
    const loadingText = document.getElementById('loadingText');
    const statusText = document.getElementById('statusText');

    btn.textContent = 'ANALYSE...';
    btn.disabled = true;
    loadingBar.classList.add('active');
    loadingText.classList.add('active');
    statusText.textContent = 'ANALYSE EN COURS';
    resultPanel.classList.remove('visible');

    const formData = new FormData();
    formData.append('image', file);

    try {
      const response = await fetch('/analyze', { method: 'POST', body: formData });
      const data = await response.json();

      if (data.result) {
        const { decision, metrics, analysis } = parseResult(data.result);

        // Decision block
        const block = document.getElementById('decisionBlock');
        block.className = 'decision-block ' + decision.type;
        document.getElementById('decisionText').textContent = decision.text;
        document.getElementById('confidenceText').textContent = decision.confidence ? 'Confiance ' + decision.confidence : '';

        // Metrics
        document.getElementById('metricEntry').textContent = metrics.entry;
        document.getElementById('metricSL').textContent = metrics.sl;
        document.getElementById('metricTP').textContent = metrics.tp;

        // Analyse cachée
        document.getElementById('analysisText').innerHTML = analysis.replace(/\n/g, '<br>');

        resultPanel.classList.add('visible');
        statusText.textContent = 'ANALYSE COMPLÈTE';
      } else {
        statusText.textContent = 'ERREUR';
      }
    } catch (e) {
      statusText.textContent = 'ERREUR SERVEUR';
    }

    btn.textContent = 'Analyser';
    btn.disabled = false;
    loadingBar.classList.remove('active');
    loadingText.classList.remove('active');
  }
</script>
</body>
</html>
