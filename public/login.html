<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — IA Trading</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --cyan: #00f5ff; --blue: #0080ff; --purple: #8000ff; --green: #00ff88; --red: #ff3060; --dark: #020510; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--dark); font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: crosshair; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 50%, rgba(0,128,255,0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 30%, rgba(128,0,255,0.08) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; animation: float linear infinite; opacity: 0; }
    @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; } }
    .card { position: relative; z-index: 1; background: rgba(0,15,40,0.85); border: 1px solid rgba(0,245,255,0.2); border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 420px; backdrop-filter: blur(20px); animation: fadeUp 0.8s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .corner { position: absolute; width: 16px; height: 16px; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan); }
    .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
    .corner::after { width: 2px; height: 100%; top: 0; left: 0; }
    .corner.tr::before { left: auto; right: 0; } .corner.tr::after { left: auto; right: 0; }
    .corner.bl::before { top: auto; bottom: 0; } .corner.bl::after { top: auto; bottom: 0; }
    .corner.br::before { left: auto; right: 0; top: auto; bottom: 0; } .corner.br::after { left: auto; right: 0; top: auto; bottom: 0; }
    .corner.tl { top: -1px; left: -1px; } .corner.tr { top: -1px; right: -1px; }
    .corner.bl { bottom: -1px; left: -1px; } .corner.br { bottom: -1px; right: -1px; }
    .logo { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 4px; color: var(--cyan); text-transform: uppercase; text-align: center; margin-bottom: 8px; opacity: 0.7; }
    h1 { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; text-align: center; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 36px; }
    .field { margin-bottom: 20px; }
    label { display: block; font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 3px; color: rgba(0,245,255,0.5); text-transform: uppercase; margin-bottom: 8px; }
    input { width: 100%; background: rgba(0,245,255,0.04); border: 1px solid rgba(0,245,255,0.15); border-radius: 2px; padding: 14px 16px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 16px; transition: all 0.3s; outline: none; }
    input:focus { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0,245,255,0.1); }
    .btn { width: 100%; font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: #020510; background: var(--cyan); border: none; padding: 16px; cursor: pointer; margin-top: 8px; clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%); transition: all 0.3s; }
    .btn:hover { box-shadow: 0 0 30px rgba(0,245,255,0.4); }
    .divider { text-align: center; margin: 20px 0; color: rgba(255,255,255,0.2); font-size: 13px; letter-spacing: 2px; }
    .link { text-align: center; margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.4); }
    .link a { color: var(--cyan); text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    .msg { padding: 12px 16px; border-radius: 2px; margin-bottom: 20px; font-size: 14px; letter-spacing: 0.5px; display: none; }
    .msg.error { background: rgba(255,48,96,0.1); border: 1px solid rgba(255,48,96,0.3); color: var(--red); }
    .msg.success { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="card">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="logo">◈ Système d'analyse avancée ◈</div>
  <h1>Connexion</h1>
  <div class="msg" id="msg"></div>
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="votre@email.com" />
  </div>
  <div class="field">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" />
  </div>
  <button class="btn" onclick="login()">Se connecter</button>
  <div class="divider">— ou —</div>
  <div class="link">Pas encore de compte ? <a href="/register.html">S'inscrire</a></div>
</div>

<script>
  const pContainer = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;animation-duration:${6+Math.random()*12}s;animation-delay:${Math.random()*10}s;--drift:${(Math.random()-0.5)*100}px;background:${Math.random()>0.5?'#00f5ff':'#0080ff'};box-shadow:0 0 4px currentColor;`;
    pContainer.appendChild(p);
  }

  const params = new URLSearchParams(window.location.search);
  if (params.get('verified')) showMsg('✅ Email vérifié ! Vous pouvez vous connecter.', 'success');
  if (params.get('error')) showMsg('❌ Lien invalide ou expiré.', 'error');

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) return showMsg('Remplissez tous les champs', 'error');

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.error) return showMsg(data.error, 'error');
      if (data.success) window.location.href = '/';
    } catch(e) {
      showMsg('Erreur de connexion au serveur', 'error');
    }
  }

  document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
