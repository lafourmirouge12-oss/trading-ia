<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — AI-Mazza</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--cyan:#00f5ff;--blue:#0080ff;--purple:#8000ff;--green:#00ff88;--red:#ff3060;--dark:#020510;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--dark);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;cursor:crosshair;overflow-x:hidden;padding:20px;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 50%,rgba(0,128,255,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 30%,rgba(128,0,255,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
    .particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .particle{position:absolute;width:2px;height:2px;border-radius:50%;animation:float linear infinite;opacity:0;}
    @keyframes float{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-10vh) translateX(var(--drift));opacity:0;}}
    .wrapper{position:relative;z-index:1;width:100%;max-width:420px;animation:fadeUp 0.6s ease forwards;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .logo{text-align:center;margin-bottom:24px;}
    .logo-text{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(135deg,#fff 0%,var(--cyan) 40%,var(--blue) 70%,var(--purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 16px rgba(0,245,255,0.4));}
    .logo-line{width:100px;height:1px;margin:8px auto 0;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
    .card{position:relative;background:rgba(0,15,40,0.9);border:1px solid rgba(0,245,255,0.2);border-radius:4px;padding:32px 24px;backdrop-filter:blur(20px);overflow:hidden;}
    .card::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,245,255,0.6),transparent);animation:scanLine 4s ease-in-out infinite;pointer-events:none;top:0;}
    @keyframes scanLine{0%{top:-2px;opacity:0;}5%{opacity:1;}95%{opacity:1;}100%{top:100%;opacity:0;}}
    .corner{position:absolute;width:16px;height:16px;}
    .corner::before,.corner::after{content:'';position:absolute;background:var(--cyan);}
    .corner::before{width:100%;height:2px;top:0;left:0;}
    .corner::after{width:2px;height:100%;top:0;left:0;}
    .corner.tr::before{left:auto;right:0;}.corner.tr::after{left:auto;right:0;}
    .corner.bl::before{top:auto;bottom:0;}.corner.bl::after{top:auto;bottom:0;}
    .corner.br::before{left:auto;right:0;top:auto;bottom:0;}.corner.br::after{left:auto;right:0;top:auto;bottom:0;}
    .corner.tl{top:-1px;left:-1px;}.corner.tr{top:-1px;right:-1px;}
    .corner.bl{bottom:-1px;left:-1px;}.corner.br{bottom:-1px;right:-1px;}
    .tabs{display:flex;margin-bottom:22px;border-bottom:1px solid rgba(0,245,255,0.15);}
    .tab{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);padding:10px 16px;cursor:pointer;transition:all 0.3s;border-bottom:2px solid transparent;margin-bottom:-1px;flex:1;text-align:center;}
    .tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
    .form{display:none;}.form.active{display:block;}
    .field{margin-bottom:15px;}
    label{display:block;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;color:rgba(0,245,255,0.5);text-transform:uppercase;margin-bottom:7px;}
    input{width:100%;background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.15);border-radius:2px;padding:13px 14px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:16px;transition:all 0.3s;outline:none;-webkit-appearance:none;}
    input:focus{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,245,255,0.1);}
    input::placeholder{color:rgba(255,255,255,0.2);}
    .btn{width:100%;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#020510;background:var(--cyan);border:none;padding:14px;cursor:pointer;margin-top:8px;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:all 0.3s;-webkit-appearance:none;}
    .btn:hover{box-shadow:0 0 30px rgba(0,245,255,0.4);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .msg{padding:11px 14px;border-radius:2px;margin-bottom:14px;font-size:13px;display:none;line-height:1.5;}
    .msg.error{background:rgba(255,48,96,0.1);border:1px solid rgba(255,48,96,0.3);color:var(--red);display:block;}
    .msg.success{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);display:block;}
    .resend-btn{width:100%;background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.25);color:var(--cyan);padding:10px;cursor:pointer;font-size:13px;margin-top:8px;display:none;font-family:'Rajdhani',sans-serif;letter-spacing:1px;border-radius:2px;transition:all 0.3s;}
    .free-badge{background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);border-radius:2px;padding:10px 14px;text-align:center;margin-bottom:16px;font-size:13px;color:var(--green);letter-spacing:1px;}
    .link{text-align:center;margin-top:16px;font-size:14px;color:rgba(255,255,255,0.4);}
    .link a{color:var(--cyan);text-decoration:none;}
    @media(max-width:480px){
      body{padding:16px;align-items:flex-start;padding-top:30px;}
      .logo-text{font-size:16px;letter-spacing:4px;}
      .card{padding:24px 18px;}
      .tab{font-size:8px;padding:9px 10px;}
      input{font-size:16px;}
      .btn{font-size:10px;letter-spacing:2px;padding:13px;}
    }
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="wrapper">
  <div class="logo">
    <div class="logo-text">AI-Mazza</div>
    <div class="logo-line"></div>
  </div>
  <div class="card">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Connexion</div>
      <div class="tab" onclick="switchTab('register')">Inscription</div>
    </div>
    <div class="form active" id="formLogin">
      <div class="msg" id="msgLogin"></div>
      <button class="resend-btn" id="resendBtn" onclick="resendEmail()">↻ Renvoyer l'email de confirmation</button>
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="votre@email.com" autocomplete="email"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn" id="btnLogin" onclick="doLogin()">Se connecter</button>
      <div class="link">Pas de compte ? <a href="#" onclick="switchTab('register');return false;">S'inscrire</a></div>
    </div>
    <div class="form" id="formRegister">
      <div class="free-badge">🎁 2 analyses gratuites à l'inscription</div>
      <div class="msg" id="msgRegister"></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="votre@email.com" autocomplete="email"/></div>
      <div class="field"><label>Mot de passe</label><input type="password" id="regPassword" placeholder="Min. 6 caractères" autocomplete="new-password"/></div>
      <button class="btn" id="btnRegister" onclick="doRegister()">Créer mon compte</button>
      <div class="link">Déjà un compte ? <a href="#" onclick="switchTab('login');return false;">Se connecter</a></div>
    </div>
  </div>
</div>
<script>
  const pContainer=document.getElementById('particles');
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*12}s;animation-delay:${Math.random()*10}s;--drift:${(Math.random()-0.5)*100}px;background:${Math.random()>0.5?'#00f5ff':Math.random()>0.5?'#0080ff':'#8000ff'};box-shadow:0 0 4px currentColor;`;pContainer.appendChild(p);}
  const params=new URLSearchParams(window.location.search);
  if(params.get('verified'))showMsg('msgLogin','✅ Email vérifié ! Vous pouvez vous connecter.','success');
  if(params.get('error'))showMsg('msgLogin','❌ Lien invalide ou expiré.','error');
  function switchTab(tab){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));document.getElementById('formLogin').classList.toggle('active',tab==='login');document.getElementById('formRegister').classList.toggle('active',tab==='register');}
  function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;}
  async function doLogin(){
    const email=document.getElementById('loginEmail').value.trim();
    const password=document.getElementById('loginPassword').value;
    if(!email||!password){showMsg('msgLogin','Remplissez tous les champs','error');return;}
    const btn=document.getElementById('btnLogin');btn.disabled=true;btn.textContent='Connexion...';
    try{
      const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(data.error&&(data.error.includes('Vérifiez')||data.error==='email_not_verified')){showMsg('msgLogin','⚠️ Vérifiez votre email avant de vous connecter.','error');document.getElementById('resendBtn').style.display='block';}
      else if(data.error){showMsg('msgLogin','❌ '+data.error,'error');}
      else if(data.success){showMsg('msgLogin','✓ Connecté ! Redirection...','success');setTimeout(()=>window.location.href=data.redirect||'/',1000);}
    }catch(e){showMsg('msgLogin','❌ Erreur serveur','error');}
    btn.disabled=false;btn.textContent='Se connecter';
  }
  async function doRegister(){
    const email=document.getElementById('regEmail').value.trim();
    const password=document.getElementById('regPassword').value;
    if(!email||!password){showMsg('msgRegister','Remplissez tous les champs','error');return;}
    if(password.length<6){showMsg('msgRegister','Mot de passe trop court (6 min)','error');return;}
    const btn=document.getElementById('btnRegister');btn.disabled=true;btn.textContent='Envoi...';
    try{
      const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(data.error){showMsg('msgRegister','❌ '+data.error,'error');}
      else if(data.success){showMsg('msgRegister','✅ Email de confirmation envoyé ! Vérifiez votre boîte mail.','success');document.getElementById('regEmail').value='';document.getElementById('regPassword').value='';}
    }catch(e){showMsg('msgRegister','❌ Erreur serveur','error');}
    btn.disabled=false;btn.textContent='Créer mon compte';
  }
  async function resendEmail(){
    const email=document.getElementById('loginEmail').value.trim();
    if(!email){showMsg('msgLogin','Entrez votre email','error');return;}
    const btn=document.getElementById('resendBtn');btn.textContent='⏳ Envoi...';btn.disabled=true;
    try{
      const res=await fetch('/resend-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      const data=await res.json();
      if(data.success){showMsg('msgLogin','✅ '+data.success,'success');btn.style.display='none';}
      if(data.error)showMsg('msgLogin','❌ '+data.error,'error');
    }catch(e){showMsg('msgLogin','❌ Erreur serveur','error');}
    btn.textContent="↻ Renvoyer l'email";btn.disabled=false;
  }
  document.addEventListener('keypress',e=>{if(e.key==='Enter'){if(document.getElementById('formLogin').classList.contains('active'))doLogin();else doRegister();}});
</script>
</body>
</html>
